services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aurora_iam_it
      POSTGRES_USER: aurora
      POSTGRES_PASSWORD: aurora_password
    ports:
      - "127.0.0.1:25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora -d aurora_iam_it -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "127.0.0.1:26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

name: release-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go vet
        run: go vet ./...

      - name: Go test race
        run: go test -race ./...

  integration-and-k6-smoke:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Start integration stack
        run: docker compose -f internal/test/integration/docker-compose.yml up -d --wait

      - name: Repository integration tests (compose)
        env:
          IAM_IT_DB_URL: postgres://aurora:aurora_password@127.0.0.1:25432/aurora_iam_it?sslmode=disable&search_path=iam
        run: go test ./internal/test/repo_test -count=1

      - name: Start API server for k6 smoke
        env:
          APP_TIMEZONE: UTC
          APP_HTTP_PORT: "8000"
          APP_LOG_LEVEL: info
          APP_PUBLIC_URL: http://127.0.0.1:8000
          APP_ENABLE_RATE_LIMIT: "true"
          APP_TRUSTED_PROXIES: 127.0.0.1/32
          APP_ALLOWED_ORIGINS: http://127.0.0.1:8000
          CORE_SECRET_MASTER_KEY: 1xQzGiXjRsnVV0el4Q61Z/epBq8zdwudBo4cX14/NWA=
          SECURITY_ADMIN_API_TOKEN_TTL: 15m
          SECURITY_ADMIN_API_TOKEN_ROTATE_BEFORE: 5m
          SECURITY_SECRET_ROTATE_INTERVAL: 24h
          SECURITY_SECRET_PREVIOUS_OVERLAP: 24h
          SECURITY_ADMIN_BOOTSTRAP_TOKEN_PATH: /tmp/iam-bootstrap-token
          SECURITY_ADMIN_BOOTSTRAP_TOKEN_FILE_TTL: 1m
          PSQL_HOST: 127.0.0.1
          PSQL_PORT: "25432"
          PSQL_USER: aurora
          PSQL_PASSWORD: aurora_password
          PSQL_DBNAME: aurora_iam_it
          PSQL_SSLMODE: disable
          PSQL_SCHEMA: iam
          PSQL_TLS_ENABLED: "false"
          REDIS_ADDR: 127.0.0.1:26379
          REDIS_PASSWORD: ""
          REDIS_DB: "0"
          REDIS_TLS_ENABLED: "false"
          GRPC_SERVER_PORT: "9090"
        run: |
          set -euo pipefail
          go run ./cmd/server > /tmp/iam-server.log 2>&1 &
          echo $! > /tmp/iam-server.pid

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/api/v1/health/liveness >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat /tmp/iam-server.log
          exit 1

      - name: k6 smoke gate
        env:
          BASE_URL: http://127.0.0.1:8000
        run: k6 run internal/test/loadtest/k6-smoke.js

      - name: Teardown
        if: always()
        run: |
          if [ -f /tmp/iam-server.pid ]; then
            kill "$(cat /tmp/iam-server.pid)" || true
          fi
          docker compose -f internal/test/integration/docker-compose.yml down -v

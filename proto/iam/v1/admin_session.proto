syntax = "proto3";

package aurora.iam.v1;

option go_package = "iam/internal/transport/grpc/adminsessionpb;adminsessionpb";

service AdminSessionService {
  rpc AuthorizeSession(AuthorizeAdminSessionRequest) returns (AuthorizeAdminSessionResponse);
}

message AuthorizeAdminSessionRequest {
  string session_token = 1;
  string device_id = 2;
  string device_secret = 3;
  string client_ip = 4;
  string user_agent = 5;
}

message AuthorizeAdminSessionResponse {
  string admin_user_id = 1;
  string display_name = 2;
  string credential_id = 3;
  string device_id = 4;
  string session_id = 5;
}

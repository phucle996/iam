syntax = "proto3";

package aurora.iam.v1;

option go_package = "iam/internal/transport/grpc/secretpb;secretpb";

import "google/protobuf/timestamp.proto";

service SecretRuntimeService {
  rpc GetSecretCandidates(GetSecretCandidatesRequest) returns (GetSecretCandidatesResponse);
}

message GetSecretCandidatesRequest {
  repeated string families = 1;
}

message GetSecretCandidatesResponse {
  map<string, SecretVersionList> families = 1;
}

message SecretVersionList {
  repeated SecretVersion candidates = 1;
}

message SecretVersion {
  string family = 1;
  int64 version = 2;
  string value = 3;
  google.protobuf.Timestamp expires_at = 4;
  google.protobuf.Timestamp rotated_at = 5;
}
